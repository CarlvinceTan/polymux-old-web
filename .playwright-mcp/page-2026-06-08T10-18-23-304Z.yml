      - main [ref=e203]:
        - generic [ref=e204]:
          - article [ref=e205]:
            - heading "Quickstart" [level=1] [ref=e206]
            - paragraph [ref=e207]: This walks through creating a Polymux account, opening your first session, and running an agent on a real website in about five minutes.
            - heading "1. Create an account" [level=2] [ref=e208]
            - paragraph [ref=e209]:
              - text: Sign up at
              - link "polymux.com" [ref=e210] [cursor=pointer]:
                - /url: /sign-up
              - text: using an email address or Google. You will be dropped into a free workspace called
              - emphasis [ref=e211]: Personal
              - text: — you can invite teammates later, but for now everything lives in here.
            - paragraph [ref=e212]: The free plan includes three agents, two concurrent browser sessions, and 100 MB of workspace storage. That is enough to follow this guide and quite a bit more.
            - heading "2. Start your first workflow" [level=2] [ref=e213]
            - paragraph [ref=e214]:
              - text: From the dashboard, press
              - strong [ref=e215]: + New Workflow
              - text: in the left side panel. A draft workflow opens with a chat box and a live browser viewport docked next to it.
            - paragraph [ref=e216]: "Type a request like:"
            - blockquote [ref=e217]:
              - paragraph [ref=e218]: Open Hacker News and read me the top three story titles.
            - paragraph [ref=e219]:
              - text: Press
              - strong [ref=e220]: Send
              - text: . The agent will open a browser tab, navigate, and stream the page back into the viewport. Anything it reads is shown in the chat alongside the actions it took.
            - heading "3. Watch the agent work" [level=2] [ref=e221]
            - paragraph [ref=e222]: "The viewport on the right shows exactly what the agent sees. You can:"
            - list [ref=e223]:
              - listitem [ref=e224]:
                - strong [ref=e225]: Hover
                - text: to highlight elements the agent is about to interact with.
              - listitem [ref=e226]:
                - strong [ref=e227]: Take over
                - text: by clicking
                - emphasis [ref=e228]: Pause
                - text: — the agent stops, you drive manually, and clicking
                - emphasis [ref=e229]: Resume
                - text: hands control back.
              - listitem [ref=e230]:
                - strong [ref=e231]: Switch views
                - text: between the live browser, the workflow graph, and the artifact gallery (screenshots, files, downloads) from the toggle above the viewport.
            - paragraph [ref=e232]: Sessions stay live until you close them or they finish. Closing the tab does not end the session — it keeps running on the server and you can re-attach from the side panel.
            - heading "4. Save it as a workflow" [level=2] [ref=e233]
            - paragraph [ref=e234]:
              - text: A free-form chat is a session. To make it reusable, press
              - strong [ref=e235]: Save as workflow
              - text: at the top of the chat. Polymux captures the agent prompt, the tools used, and any vault entries it referenced, and stores it as a versioned workflow your team can rerun.
            - paragraph [ref=e236]:
              - text: Workflows can also be scheduled. From the workflow page, switch to the
              - strong [ref=e237]: Schedule
              - text: tab to run them on a cron expression — daily, weekly, or on a custom interval.
            - heading "5. Where to go next" [level=2] [ref=e238]
            - paragraph [ref=e239]: "You now have the basics. Pick one:"
            - list [ref=e240]:
