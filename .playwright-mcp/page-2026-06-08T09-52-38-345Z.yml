      - main [ref=e78]:
        - generic [ref=e79]:
          - article [ref=e80]:
            - heading "Introduction" [level=1] [ref=e81]
            - paragraph [ref=e82]: Polymux is a platform for building, running, and sharing AI agents that work the web on your behalf. Agents drive real browser sessions, hand off to one another, store secrets in a vault, and replay their runs — all from a workspace your team controls.
            - paragraph [ref=e83]:
              - text: This documentation is split into two parts. The
              - strong [ref=e84]: User guide
              - text: walks through installing Polymux, getting set up, and using the product day-to-day. The
              - strong [ref=e85]: Developer guide
              - text: explains how to build and publish packaged workflows and connections so other people can install them in one click.
            - paragraph [ref=e86]:
              - text: If you have not used Polymux before, start with
              - link "Quickstart" [ref=e87] [cursor=pointer]:
                - /url: /documentation/quickstart
              - text: . If you arrived here looking for an API reference, jump straight to the
              - link "API overview" [ref=e88] [cursor=pointer]:
                - /url: /documentation/api-overview
              - text: .
            - heading "What Polymux gives you" [level=2] [ref=e89]
            - paragraph [ref=e90]: "Polymux is built around three primitives:"
            - list [ref=e91]:
              - listitem [ref=e92]:
                - strong [ref=e93]: Sessions
                - text: — a single conversation with one agent, backed by a live browser. Sessions stream every click, scroll, and form fill to your dashboard.
              - listitem [ref=e94]:
                - strong [ref=e95]: Workflows
                - text: — a directed graph of agents, viewports, and tools. Workflows are versioned, can be scheduled, and can be packaged for the marketplace.
              - listitem [ref=e96]:
                - strong [ref=e97]: Workspaces
                - text: — the shared container for your team's workflows, vault entries, files, and billing. Members are added by invitation and assigned roles.
            - paragraph [ref=e98]: These three concepts come up everywhere in the rest of the docs. If a section uses one without explaining it, this is the page to come back to.
            - heading "What's new" [level=2] [ref=e99]
            - paragraph [ref=e100]:
              - text: This documentation site is itself live work-in-progress. Pages marked
              - emphasis [ref=e101]: Draft
              - text: in the sidebar are stubs. If a topic is missing entirely, the
              - link "forum" [ref=e102] [cursor=pointer]:
                - /url: /forum
              - text: is the fastest way to ask.
            - heading "How to read these docs" [level=2] [ref=e103]
            - paragraph [ref=e104]: The left sidebar groups pages into sections. The right rail tracks where you are on the current page and lets you jump between headings. Every page ends with links to the previous and next page in reading order, so you can step through the whole guide from start to finish without going back to the sidebar.
            - paragraph [ref=e105]: Polymux is in active development. We bump these pages whenever the product changes, so it is worth checking back if you are following an older guide.
