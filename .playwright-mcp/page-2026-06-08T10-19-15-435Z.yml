      - main [ref=e203]:
        - generic [ref=e204]:
          - article [ref=e205]:
            - heading "クイックスタート" [level=1] [ref=e411]
            - paragraph [ref=e412]: このガイドでは、Polymuxアカウントの作成、最初のセッションの開始、実際のウェブサイトでのエージェントの実行までを約5分で進めます。
            - heading "1. アカウントを作成する" [level=2] [ref=e413]
            - paragraph [ref=e414]:
              - link "polymux.com" [ref=e415] [cursor=pointer]:
                - /url: /sign-up
              - text: でメールアドレスまたはGoogleを使って登録してください。
              - emphasis [ref=e416]: Personal
              - text: という無料ワークスペースに案内されます。チームメイトの招待は後ほど可能ですが、当面はすべてここに格納されます。
            - paragraph [ref=e417]: 無料プランには、エージェント3つ、同時ブラウザセッション2つ、ワークスペースストレージ100 MBが含まれます。このガイドを進めるには十分すぎる量です。
            - heading "2. 最初のワークフローを開始する" [level=2] [ref=e418]
            - paragraph [ref=e419]:
              - text: ダッシュボードから、左サイドパネルの
              - strong [ref=e420]: + New Workflow
              - text: を押してください。チャットボックスとライブブラウザビューポートがドッキングされたドラフトワークフローが開きます。
            - paragraph [ref=e421]: 次のようなリクエストを入力してください。
            - blockquote [ref=e422]:
              - paragraph [ref=e423]: Hacker Newsを開いて、上位3つのストーリーのタイトルを読み上げてください。
            - paragraph [ref=e424]:
              - strong [ref=e425]: Send
              - text: を押します。エージェントはブラウザタブを開いてナビゲートし、ページをビューポートにストリーミングして返します。エージェントが読み取った内容は、それが行った操作と共にチャットに表示されます。
            - heading "3. エージェントの動作を見る" [level=2] [ref=e426]
            - paragraph [ref=e427]: 右側のビューポートには、エージェントが見ているものがそのまま表示されます。次のことができます。
            - list [ref=e428]:
              - listitem [ref=e429]:
                - strong [ref=e430]: ホバー
                - text: すると、エージェントがこれから操作する要素がハイライトされます。
              - listitem [ref=e431]:
                - emphasis [ref=e432]: Pause
                - text: をクリックして
                - strong [ref=e433]: 引き継ぎ
                - text: すると、エージェントは停止し、あなたが手動で操作できます。
                - emphasis [ref=e434]: Resume
                - text: をクリックすると制御が戻ります。
              - listitem [ref=e435]:
                - text: ビューポート上部のトグルで、ライブブラウザ、ワークフローグラフ、アーティファクトギャラリー(スクリーンショット、ファイル、ダウンロード)の
                - strong [ref=e436]: 表示を切り替え
                - text: られます。
            - paragraph [ref=e437]: セッションは閉じるか終了するまで稼働し続けます。タブを閉じてもセッションは終了しません。サーバー上で動作し続け、サイドパネルから再接続できます。
            - heading "4. ワークフローとして保存する" [level=2] [ref=e438]
            - paragraph [ref=e439]:
              - text: 自由形式のチャットはセッションです。再利用可能にするには、チャットの上部にある
              - strong [ref=e440]: Save as workflow
              - text: を押してください。Polymuxはエージェントプロンプト、使用されたツール、参照されたvaultエントリをキャプチャし、チームが再実行できるバージョン管理されたワークフローとして保存します。
            - paragraph [ref=e441]:
              - text: ワークフローはスケジュール実行もできます。ワークフローページから
              - strong [ref=e442]: Schedule
              - text: タブに切り替えると、cron式で実行できます。毎日、毎週、またはカスタムインターバルでの実行が可能です。
            - heading "5. 次のステップ" [level=2] [ref=e443]
            - paragraph [ref=e444]: これで基本は習得できました。次のいずれかを選んでください。
            - list [ref=e445]:
              - listitem [ref=e446]:
                - strong [ref=e447]: ワークフローをチームと共有したい場合は?
                - link "Workspaces and members" [ref=e448] [cursor=pointer]:
                  - /url: /documentation/workspaces
                - text: を読んでください。
              - listitem [ref=e449]:
                - strong [ref=e450]: ログイン情報やAPIキーを保存する場合は?
                - link "Vault basics" [ref=e451] [cursor=pointer]:
                  - /url: /documentation/vault
                - text: を読んでください。
              - listitem [ref=e452]:
                - strong [ref=e453]: 行き詰まった場合は?
                - link "FAQ" [ref=e454] [cursor=pointer]:
                  - /url: /documentation/faq
                - text: で最も一般的なつまずきを解説しています。
              - listitem [ref=e455]:
                - strong [ref=e456]: Polymuxの上に何かを構築する場合は?
                - link "Plugin overview" [ref=e457] [cursor=pointer]:
                  - /url: /documentation/plugin-overview
                - text: に進んでください。
