      - main [ref=e78]:
        - generic [ref=e79]:
          - article [ref=e80]:
            - heading "クイックスタート" [level=1] [ref=e81]
            - paragraph [ref=e82]: このガイドでは、Polymuxアカウントの作成、最初のセッションの開始、実際のウェブサイトでのエージェントの実行までを約5分で進めます。
            - heading "1. アカウントを作成する" [level=2] [ref=e83]
            - paragraph [ref=e84]:
              - link "polymux.com" [ref=e85] [cursor=pointer]:
                - /url: /sign-up
              - text: でメールアドレスまたはGoogleを使って登録してください。
              - emphasis [ref=e86]: Personal
              - text: という無料ワークスペースに案内されます。チームメイトの招待は後ほど可能ですが、当面はすべてここに格納されます。
            - paragraph [ref=e87]: 無料プランには、エージェント3つ、同時ブラウザセッション2つ、ワークスペースストレージ100 MBが含まれます。このガイドを進めるには十分すぎる量です。
            - heading "2. 最初のワークフローを開始する" [level=2] [ref=e88]
            - paragraph [ref=e89]:
              - text: ダッシュボードから、左サイドパネルの
              - strong [ref=e90]: + New Workflow
              - text: を押してください。チャットボックスとライブブラウザビューポートがドッキングされたドラフトワークフローが開きます。
            - paragraph [ref=e91]: 次のようなリクエストを入力してください。
            - blockquote [ref=e92]:
              - paragraph [ref=e93]: Hacker Newsを開いて、上位3つのストーリーのタイトルを読み上げてください。
            - paragraph [ref=e94]:
              - strong [ref=e95]: Send
              - text: を押します。エージェントはブラウザタブを開いてナビゲートし、ページをビューポートにストリーミングして返します。エージェントが読み取った内容は、それが行った操作と共にチャットに表示されます。
            - heading "3. エージェントの動作を見る" [level=2] [ref=e96]
            - paragraph [ref=e97]: 右側のビューポートには、エージェントが見ているものがそのまま表示されます。次のことができます。
            - list [ref=e98]:
              - listitem [ref=e99]:
                - strong [ref=e100]: ホバー
                - text: すると、エージェントがこれから操作する要素がハイライトされます。
              - listitem [ref=e101]:
                - emphasis [ref=e102]: Pause
                - text: をクリックして
                - strong [ref=e103]: 引き継ぎ
                - text: すると、エージェントは停止し、あなたが手動で操作できます。
                - emphasis [ref=e104]: Resume
                - text: をクリックすると制御が戻ります。
              - listitem [ref=e105]:
                - text: ビューポート上部のトグルで、ライブブラウザ、ワークフローグラフ、アーティファクトギャラリー(スクリーンショット、ファイル、ダウンロード)の
                - strong [ref=e106]: 表示を切り替え
                - text: られます。
            - paragraph [ref=e107]: セッションは閉じるか終了するまで稼働し続けます。タブを閉じてもセッションは終了しません。サーバー上で動作し続け、サイドパネルから再接続できます。
            - heading "4. ワークフローとして保存する" [level=2] [ref=e108]
            - paragraph [ref=e109]:
              - text: 自由形式のチャットはセッションです。再利用可能にするには、チャットの上部にある
              - strong [ref=e110]: Save as workflow
              - text: を押してください。Polymuxはエージェントプロンプト、使用されたツール、参照されたvaultエントリをキャプチャし、チームが再実行できるバージョン管理されたワークフローとして保存します。
            - paragraph [ref=e111]:
              - text: ワークフローはスケジュール実行もできます。ワークフローページから
              - strong [ref=e112]: Schedule
              - text: タブに切り替えると、cron式で実行できます。毎日、毎週、またはカスタムインターバルでの実行が可能です。
            - heading "5. 次のステップ" [level=2] [ref=e113]
            - paragraph [ref=e114]: これで基本は習得できました。次のいずれかを選んでください。
            - list [ref=e115]:
              - listitem [ref=e116]:
                - strong [ref=e117]: ワークフローをチームと共有したい場合は?
                - link "Workspaces and members" [ref=e118] [cursor=pointer]:
                  - /url: /documentation/workspaces
                - text: を読んでください。
              - listitem [ref=e119]:
                - strong [ref=e120]: ログイン情報やAPIキーを保存する場合は?
                - link "Vault basics" [ref=e121] [cursor=pointer]:
                  - /url: /documentation/vault
                - text: を読んでください。
              - listitem [ref=e122]:
                - strong [ref=e123]: 行き詰まった場合は?
                - link "FAQ" [ref=e124] [cursor=pointer]:
                  - /url: /documentation/faq
                - text: で最も一般的なつまずきを解説しています。
              - listitem [ref=e125]:
                - strong [ref=e126]: Polymuxの上に何かを構築する場合は?
                - link "Plugin overview" [ref=e127] [cursor=pointer]:
                  - /url: /documentation/plugin-overview
                - text: に進んでください。
