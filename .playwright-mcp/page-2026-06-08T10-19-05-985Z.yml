      - main [ref=e203]:
        - generic [ref=e204]:
          - article [ref=e205]:
            - heading "Démarrage rapide" [level=1] [ref=e339]
            - paragraph [ref=e340]: Ce guide vous accompagne dans la création d'un compte Polymux, l'ouverture de votre première session et l'exécution d'un agent sur un vrai site web, le tout en environ cinq minutes.
            - heading "1. Créer un compte" [level=2] [ref=e341]
            - paragraph [ref=e342]:
              - text: Inscrivez-vous sur
              - link "polymux.com" [ref=e343] [cursor=pointer]:
                - /url: /sign-up
              - text: avec une adresse e-mail ou via Google. Vous serez placé dans un espace de travail gratuit appelé
              - emphasis [ref=e344]: Personnel
              - text: — vous pourrez inviter des coéquipiers plus tard, mais pour l'instant tout s'y trouve.
            - paragraph [ref=e345]: L'offre gratuite inclut trois agents, deux sessions de navigateur concurrentes et 100 Mo de stockage d'espace de travail. C'est suffisant pour suivre ce guide et bien plus encore.
            - heading "2. Démarrer votre premier workflow" [level=2] [ref=e346]
            - paragraph [ref=e347]:
              - text: Depuis le tableau de bord, appuyez sur
              - strong [ref=e348]: + Nouveau workflow
              - text: dans le panneau latéral gauche. Un workflow brouillon s'ouvre avec une zone de chat et une vue de navigateur en direct ancrée à côté.
            - paragraph [ref=e349]: "Tapez une requête comme :"
            - blockquote [ref=e350]:
              - paragraph [ref=e351]: Ouvre Hacker News et lis-moi les titres des trois premières histoires.
            - paragraph [ref=e352]:
              - text: Appuyez sur
              - strong [ref=e353]: Envoyer
              - text: . L'agent va ouvrir un onglet de navigateur, naviguer et diffuser la page dans la vue. Tout ce qu'il lit est affiché dans le chat à côté des actions qu'il a effectuées.
            - heading "3. Regarder l'agent travailler" [level=2] [ref=e354]
            - paragraph [ref=e355]: "La vue à droite affiche exactement ce que l'agent voit. Vous pouvez :"
            - list [ref=e356]:
              - listitem [ref=e357]:
                - strong [ref=e358]: Survoler
                - text: pour mettre en évidence les éléments avec lesquels l'agent est sur le point d'interagir.
              - listitem [ref=e359]:
                - strong [ref=e360]: Prendre le relais
                - text: en cliquant sur
                - emphasis [ref=e361]: Pause
                - text: — l'agent s'arrête, vous pilotez manuellement, et cliquer sur
                - emphasis [ref=e362]: Reprendre
                - text: lui redonne le contrôle.
              - listitem [ref=e363]:
                - strong [ref=e364]: Changer de vue
                - text: entre le navigateur en direct, le graphe du workflow et la galerie d'artefacts (captures d'écran, fichiers, téléchargements) via le sélecteur au-dessus de la vue.
            - paragraph [ref=e365]: Les sessions restent actives jusqu'à ce que vous les fermiez ou qu'elles se terminent. Fermer l'onglet ne met pas fin à la session — elle continue de tourner sur le serveur et vous pouvez vous y rattacher depuis le panneau latéral.
            - heading "4. L'enregistrer comme workflow" [level=2] [ref=e366]
            - paragraph [ref=e367]:
              - text: Un chat en forme libre est une session. Pour la rendre réutilisable, appuyez sur
              - strong [ref=e368]: Enregistrer comme workflow
              - text: en haut du chat. Polymux capture le prompt de l'agent, les outils utilisés et toutes les entrées du coffre qu'il a référencées, puis le stocke comme un workflow versionné que votre équipe pourra réexécuter.
            - paragraph [ref=e369]:
              - text: Les workflows peuvent aussi être planifiés. Depuis la page du workflow, passez à l'onglet
              - strong [ref=e370]: Planification
              - text: pour les exécuter selon une expression cron — quotidiennement, hebdomadairement ou à un intervalle personnalisé.
            - heading "5. Où aller ensuite" [level=2] [ref=e371]
            - paragraph [ref=e372]: "Vous avez désormais les bases. Choisissez l'une de ces options :"
            - list [ref=e373]:
              - listitem [ref=e374]:
                - strong [ref=e375]: Vous voulez partager un workflow avec votre équipe ?
                - text: Lisez
                - link "Espaces de travail et membres" [ref=e376] [cursor=pointer]:
                  - /url: /documentation/workspaces
                - text: .
              - listitem [ref=e377]:
                - strong [ref=e378]: Vous stockez des identifiants ou des clés d'API ?
                - text: Lisez
                - link "Bases du coffre" [ref=e379] [cursor=pointer]:
                  - /url: /documentation/vault
                - text: .
              - listitem [ref=e380]:
                - strong [ref=e381]: Vous avez heurté un mur ?
                - text: La
                - link "FAQ" [ref=e382] [cursor=pointer]:
                  - /url: /documentation/faq
                - text: couvre les écueils les plus courants.
              - listitem [ref=e383]:
                - strong [ref=e384]: Vous construisez quelque chose au-dessus de Polymux ?
                - text: Sautez directement à la
                - link "vue d'ensemble des plugins" [ref=e385] [cursor=pointer]:
