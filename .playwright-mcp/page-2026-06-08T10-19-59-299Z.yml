    - main [ref=e78]:
      - generic [ref=e79]:
        - article [ref=e80]:
          - heading "はじめに" [level=1] [ref=e81]
          - paragraph [ref=e82]: Polymuxは、あなたに代わってウェブを操作するAIエージェントを構築、実行、共有するためのプラットフォームです。エージェントは実際のブラウザセッションを動かし、互いに引き継ぎ、機密情報をvaultに保存し、実行を再生します。すべてはチームが管理するワークスペースから行えます。
          - paragraph [ref=e83]:
            - text: このドキュメントは2部構成になっています。
            - strong [ref=e84]: ユーザーガイド
            - text: では、Polymuxのインストール、セットアップ、日々の利用方法を説明します。
            - strong [ref=e85]: 開発者ガイド
            - text: では、パッケージ化されたワークフローや接続を構築・公開し、他の人がワンクリックでインストールできるようにする方法を解説します。
          - paragraph [ref=e86]:
            - text: Polymuxを初めて利用する場合は、
            - link "Quickstart" [ref=e87] [cursor=pointer]:
              - /url: /documentation/quickstart
            - text: から始めてください。APIリファレンスをお探しの場合は、
            - link "API overview" [ref=e88] [cursor=pointer]:
              - /url: /documentation/api-overview
            - text: に直接お進みください。
          - heading "Polymuxが提供するもの" [level=2] [ref=e89]
          - paragraph [ref=e90]: Polymuxは3つの基本要素を中心に構築されています。
          - list [ref=e91]:
            - listitem [ref=e92]:
              - strong [ref=e93]: Sessions
              - text: — ライブブラウザを背後に持つ1つのエージェントとの会話。セッションはすべてのクリック、スクロール、フォーム入力をダッシュボードにストリーミングします。
            - listitem [ref=e94]:
              - strong [ref=e95]: Workflows
              - text: — エージェント、ビューポート、ツールの有向グラフ。ワークフローはバージョン管理され、スケジュール実行可能で、マーケットプレイス向けにパッケージ化できます。
            - listitem [ref=e96]:
              - strong [ref=e97]: Workspaces
              - text: — チームのワークフロー、vaultエントリ、ファイル、請求情報を格納する共有コンテナ。メンバーは招待によって追加され、役割が割り当てられます。
          - paragraph [ref=e98]: これら3つの概念は、ドキュメントの他のすべての箇所で繰り返し登場します。あるセクションでこれらを説明なしに使っている場合は、このページに戻って確認してください。
          - heading "最新情報" [level=2] [ref=e99]
          - paragraph [ref=e100]:
            - text: このドキュメントサイト自体も進行中の作業です。サイドバーで
            - emphasis [ref=e101]: Draft
            - text: とマークされたページはスタブです。トピックが完全に欠けている場合は、
            - link "forum" [ref=e102] [cursor=pointer]:
              - /url: /forum
            - text: で質問するのが最も早い方法です。
          - heading "このドキュメントの読み方" [level=2] [ref=e103]
          - paragraph [ref=e104]: 左サイドバーはページをセクション別にグループ化しています。右側のレールは現在のページ上での位置を追跡し、見出し間のジャンプを可能にします。すべてのページの末尾には、読み順における前後のページへのリンクがあり、サイドバーに戻ることなくガイドを最初から最後まで通読できます。
          - paragraph [ref=e105]: Polymuxは活発に開発中です。製品が変更されるたびにこれらのページを更新していますので、古いガイドをお読みの場合は再確認することをおすすめします。
