      - main [ref=e78]:
        - generic [ref=e79]:
          - article [ref=e80]:
            - heading "Introduction" [level=1] [ref=e139]
            - paragraph [ref=e140]: Polymux est une plateforme pour créer, exécuter et partager des agents IA qui parcourent le web en votre nom. Les agents pilotent de véritables sessions de navigateur, se transmettent le relais les uns aux autres, stockent les secrets dans un coffre-fort et rejouent leurs exécutions — le tout depuis un espace de travail que votre équipe contrôle.
            - paragraph [ref=e141]:
              - text: Cette documentation est divisée en deux parties. Le
              - strong [ref=e142]: Guide utilisateur
              - text: vous accompagne dans l'installation de Polymux, sa configuration et son utilisation au quotidien. Le
              - strong [ref=e143]: Guide développeur
              - text: explique comment construire et publier des workflows et des connexions packagés afin que d'autres puissent les installer en un clic.
            - paragraph [ref=e144]:
              - text: Si vous n'avez jamais utilisé Polymux, commencez par le
              - link "Démarrage rapide" [ref=e145] [cursor=pointer]:
                - /url: /documentation/quickstart
              - text: . Si vous êtes arrivé ici à la recherche d'une référence d'API, sautez directement à la
              - link "vue d'ensemble de l'API" [ref=e146] [cursor=pointer]:
                - /url: /documentation/api-overview
              - text: .
            - heading "Ce que Polymux vous apporte" [level=2] [ref=e147]
            - paragraph [ref=e148]: "Polymux est articulé autour de trois primitives :"
            - list [ref=e149]:
              - listitem [ref=e150]:
                - strong [ref=e151]: Sessions
                - text: — une conversation unique avec un agent, adossée à un navigateur en direct. Les sessions diffusent chaque clic, défilement et remplissage de formulaire vers votre tableau de bord.
              - listitem [ref=e152]:
                - strong [ref=e153]: Workflows
                - text: — un graphe orienté d'agents, de vues et d'outils. Les workflows sont versionnés, peuvent être planifiés et packagés pour la marketplace.
              - listitem [ref=e154]:
                - strong [ref=e155]: Espaces de travail
                - text: — le conteneur partagé pour les workflows, les entrées du coffre, les fichiers et la facturation de votre équipe. Les membres sont ajoutés sur invitation et se voient attribuer des rôles.
            - paragraph [ref=e156]: Ces trois concepts reviennent partout dans le reste de la documentation. Si une section en utilise un sans l'expliquer, cette page est celle vers laquelle revenir.
            - heading "Quoi de neuf" [level=2] [ref=e157]
            - paragraph [ref=e158]:
              - text: Ce site de documentation est lui-même un travail en cours. Les pages marquées
              - emphasis [ref=e159]: Brouillon
              - text: dans la barre latérale sont des ébauches. Si un sujet manque totalement, le
              - link "forum" [ref=e160] [cursor=pointer]:
                - /url: /forum
              - text: est le moyen le plus rapide de poser la question.
            - heading "Comment lire cette documentation" [level=2] [ref=e161]
            - paragraph [ref=e162]: La barre latérale gauche regroupe les pages par section. La barre de droite suit votre position sur la page actuelle et vous permet de naviguer entre les titres. Chaque page se termine par des liens vers la page précédente et la page suivante dans l'ordre de lecture, ce qui vous permet de parcourir le guide entier du début à la fin sans revenir à la barre latérale.
            - paragraph [ref=e163]: Polymux est en développement actif. Nous mettons à jour ces pages chaque fois que le produit évolue, alors il vaut la peine d'y revenir si vous suivez un guide plus ancien.
