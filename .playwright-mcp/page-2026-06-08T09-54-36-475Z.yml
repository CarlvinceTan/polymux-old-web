        - heading "Cookie policy" [level=1] [ref=e29]
        - paragraph [ref=e30]: How we use cookies and similar technologies on our websites and services.
      - article [ref=e31]:
        - paragraph [ref=e32]:
          - emphasis [ref=e33]: "Last updated: April 6, 2026"
        - paragraph [ref=e34]:
          - text: This Cookie Policy explains how
          - strong [ref=e35]: Polymux
          - text: (“we”, “us”, or “our”) uses cookies and similar technologies when you visit our websites and use our online services (collectively, the
          - strong [ref=e36]: Sites
          - text: ). It should be read together with our Privacy Policy.
        - heading "What are cookies?" [level=2] [ref=e37]
        - paragraph [ref=e38]: Cookies are small text files stored on your device when you visit a website. They help the site remember your preferences, keep you signed in, understand how pages are used, and improve performance and security. Similar technologies include pixels, local storage, and session storage.
        - heading "How we use cookies" [level=2] [ref=e39]
        - paragraph [ref=e40]: "We use cookies and similar technologies to:"
        - list [ref=e41]:
          - listitem [ref=e42]:
            - strong [ref=e43]: Essential operations
            - text: — Enable core functionality such as authentication, session management, security, load balancing, and fraud prevention
          - listitem [ref=e44]:
            - strong [ref=e45]: Preferences
            - text: — Remember settings like language, region, or UI choices
          - listitem [ref=e46]:
            - strong [ref=e47]: Analytics
            - text: — Understand how visitors use the Sites (for example pages viewed, navigation paths, and approximate geography), so we can improve content and product experience
          - listitem [ref=e48]:
            - strong [ref=e49]: Product features
            - text: — Support features that depend on remembering state between visits
        - paragraph [ref=e50]: The exact cookies we set may change as we update the Sites. Where required, we will request your consent before using non-essential cookies.
        - heading "Types of cookies" [level=2] [ref=e51]
        - paragraph [ref=e52]: "Common categories include:"
        - table [ref=e53]:
          - rowgroup [ref=e54]:
            - row "Type Purpose" [ref=e55]:
              - columnheader "Type" [ref=e56]
              - columnheader "Purpose" [ref=e57]
          - rowgroup [ref=e58]:
            - row "Strictly necessary Required for the Sites to function; usually exempt from consent where law permits" [ref=e59]:
              - cell "Strictly necessary" [ref=e60]
              - cell "Required for the Sites to function; usually exempt from consent where law permits" [ref=e61]
            - row "Functional Remember your choices and improve usability" [ref=e62]:
              - cell "Functional" [ref=e63]
              - cell "Remember your choices and improve usability" [ref=e64]
            - row "Analytics / performance Measure usage and improve the Sites" [ref=e65]:
              - cell "Analytics / performance" [ref=e66]
              - cell "Measure usage and improve the Sites" [ref=e67]
            - row "Marketing (if used) Deliver or measure advertising; we will describe these clearly if we use them" [ref=e68]:
              - cell "Marketing (if used)" [ref=e69]
              - cell "Deliver or measure advertising; we will describe these clearly if we use them" [ref=e70]
        - heading "Third parties" [level=2] [ref=e71]
        - paragraph [ref=e72]: Some cookies may be set by trusted service providers who assist with hosting, analytics, or embedded content. Those providers are instructed to use data in line with our agreements and applicable law. Their use is governed by their own privacy notices where relevant.
        - heading "How long cookies last" [level=2] [ref=e73]
        - list [ref=e74]:
          - listitem [ref=e75]:
            - strong [ref=e76]: Session cookies
            - text: expire when you close your browser
          - listitem [ref=e77]:
            - strong [ref=e78]: Persistent cookies
            - text: remain for a defined period or until you delete them
        - paragraph [ref=e79]: Duration depends on the specific cookie and purpose.
        - heading "Your choices" [level=2] [ref=e80]
        - paragraph [ref=e81]: "You can control cookies in several ways:"
        - list [ref=e82]:
          - listitem [ref=e83]:
            - strong [ref=e84]: Browser settings
            - text: — Most browsers let you block or delete cookies. Blocking strictly necessary cookies may affect how the Sites work.
          - listitem [ref=e85]:
            - strong [ref=e86]: Opt-out tools
            - text: — Industry programs and browser features may offer additional controls for analytics or advertising cookies where applicable.
          - listitem [ref=e87]:
            - strong [ref=e88]: Consent tools
            - text: — Where we present a cookie banner or preference center, you can adjust non-essential cookies there.
        - paragraph [ref=e89]: If you disable certain cookies, parts of the Sites (such as staying logged in) may not function properly.
        - heading "Do Not Track" [level=2] [ref=e90]
        - paragraph [ref=e91]: There is no consistent industry standard for “Do Not Track” signals. We may not respond to DNT signals in all cases.
        - heading "Changes" [level=2] [ref=e92]
        - paragraph [ref=e93]: We may update this Cookie Policy from time to time. We will post the revised version on this page and update the “Last updated” date.
        - heading "Contact" [level=2] [ref=e94]
        - paragraph [ref=e95]: Questions about this Cookie Policy can be sent through the Contact page on our website.
