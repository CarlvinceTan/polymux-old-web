                  - cell "拡張機能" [ref=e269]
                  - cell "Chrome、Edge、Brave、またはChromium 119+" [ref=e270]
                - row "デスクトップ macOS 13+、Windows 10+、または過去3年以内のLinuxディストロ" [ref=e271]:
                  - cell "デスクトップ" [ref=e272]
                  - cell "macOS 13+、Windows 10+、または過去3年以内のLinuxディストロ" [ref=e273]
                - row "ネットワーク ポート 443 / 8080 でのWebRTCおよびWebSocketのエグレス" [ref=e274]:
                  - cell "ネットワーク" [ref=e275]
                  - cell "ポート 443 / 8080 でのWebRTCおよびWebSocketのエグレス" [ref=e276]
            - paragraph [ref=e277]: ネットワークがWebRTCをブロックしている場合、ライブビューポートは数秒後により低速なポーリングストリームにフォールバックします。それ以外の機能は引き続き動作します。
            - heading "次のステップ" [level=2] [ref=e278]
            - list [ref=e279]:
              - listitem [ref=e280]:
                - text: Polymuxを初めて使う方は、
                - link "Quickstart" [ref=e281] [cursor=pointer]:
