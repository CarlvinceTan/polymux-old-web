      - main [ref=e232]:
        - generic [ref=e233]:
          - article [ref=e234]:
            - heading "インストール" [level=1] [ref=e235]
            - paragraph [ref=e236]: Polymuxはブラウザだけで完結して利用できます。インストールは不要です。ネイティブアプリやブラウザ拡張機能を使うと、ホスト型のブラウザではなくローカルブラウザを動かすなど、追加の機能が利用できます。
            - heading "ウェブアプリ" [level=2] [ref=e237]
            - paragraph [ref=e238]:
              - link "polymux.com" [ref=e239] [cursor=pointer]:
                - /url: https://polymux.com
              - text: のウェブアプリは常に最新バージョンです。最新のChromium、Firefox、Safariのいずれでも動作します。インストールするものはなく、サインインすればワークスペース、セッション、ワークフローがすぐに利用できます。
            - heading "ブラウザ拡張機能" [level=2] [ref=e240]
            - paragraph [ref=e241]:
              - text: 拡張機能を使うと、Polymuxセッションがサーバーのホスト型Chromiumではなく、
              - strong [ref=e242]: ローカルブラウザ
              - text: のタブを操作できるようになります。次のような場合に便利です。
            - list [ref=e243]:
              - listitem [ref=e244]: 既存のログインCookieを使うサイトを利用したい場合。
              - listitem [ref=e245]: ホスト型ブラウザから到達できないプライベートネットワークにアクセスしたい場合。
              - listitem [ref=e246]: 特定のブラウザプロファイル、拡張機能リスト、デバイスフィンガープリントを使いたい場合。
            - paragraph [ref=e247]:
              - text: インストールするには、
              - link "Install page" [ref=e248] [cursor=pointer]:
                - /url: /install-apps
              - text: を開いてブラウザを選択してください。拡張機能がペアリングを要求したら、任意のタブでPolymuxにサインインしてください。ペアリングは自動的に行われ、ポップアップに
              - emphasis [ref=e249]: Connected
              - text: と表示されます。
            - paragraph [ref=e250]:
              - text: 拡張機能は接続中もまったく受動的です。Polymuxセッションが
              - code [ref=e251]: "?mode=extension"
              - text: になっているときだけ動作します。ポップアップからいつでも取り消せます。
            - heading "デスクトップアプリ" [level=2] [ref=e252]
            - paragraph [ref=e253]:
              - text: macOS、Windows、Linux用のネイティブアプリは、ブラウザタブなしでPolymuxの全機能を提供します。現在プライベートベータ中です。プラットフォーム向けのビルドが利用可能になった際に通知を受け取るには、
              - link "Install page" [ref=e254] [cursor=pointer]:
                - /url: /install-apps
              - text: で登録してください。
            - paragraph [ref=e255]: デスクトップアプリは必須ではありません。このドキュメントのすべての機能はウェブアプリで動作します。
            - heading "モバイルアプリ" [level=2] [ref=e256]
            - paragraph [ref=e257]: iOSおよびAndroidアプリはロードマップに含まれています。現時点では、ウェブアプリがレスポンシブでモバイルブラウザでも動作しますが、ライブビューポートはデスクトップで最も快適にストリーミングされます。
            - heading "システム要件" [level=2] [ref=e258]
            - table [ref=e259]:
              - rowgroup [ref=e260]:
                - row "表面 要件" [ref=e261]:
                  - columnheader "表面" [ref=e262]
                  - columnheader "要件" [ref=e263]
              - rowgroup [ref=e264]:
                - row "ウェブアプリ 過去24か月以内にリリースされた任意のブラウザ" [ref=e265]:
